[honeypot]
hostname = server01
log_path = var/log/cowrie
download_path = var/lib/cowrie/downloads
state_path = var/lib/cowrie
etc_path = etc
share_path = share/cowrie

# SSH settings — listen on 2222
[ssh]
enabled = true
listen_endpoints = tcp:2222:interface=0.0.0.0
version = SSH-2.0-OpenSSH_8.2p1 Ubuntu-4ubuntu0.5

# Telnet settings — listen on 2323
[telnet]
enabled = true
listen_endpoints = tcp:2323:interface=0.0.0.0

# Output formats
[output_jsonlog]
enabled = true
logfile = ${honeypot:log_path}/cowrie.json
epoch_timestamp = false

[output_textlog]
enabled = true
logfile = ${honeypot:log_path}/cowrie.log

# Fake OS fingerprint
[shell]
arch = linux-x86_64
kernel_version = 5.15.0-58-generic
kernel_build_string = #64-Ubuntu SMP Thu Jan 5 11:43:13 UTC 2023
hardware_platform = x86_64
operating_system = GNU/Linux
