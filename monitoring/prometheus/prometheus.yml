global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

# Alerting config (optional — can add Alertmanager here)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:
  # Self-scrape Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # FastAPI backend metrics
  - job_name: 'threatshield_backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
    scrape_interval: 15s

  # Optional: node exporter for host metrics
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
