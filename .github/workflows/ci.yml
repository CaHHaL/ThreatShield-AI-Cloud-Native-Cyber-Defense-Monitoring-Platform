name: ThreatShield AI — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Lint (Python + JavaScript)
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python linters
        run: pip install ruff

      - name: Lint backend (ruff)
        run: ruff check backend/app/ --select E,W,F --ignore E501
        continue-on-error: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Check frontend build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000
          VITE_WS_URL: ws://localhost:8000

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Backend Tests
  # ──────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost:5432/testdb
          SECRET_KEY: test-secret-key
          BACKEND_CORS_ORIGINS: http://localhost:3000
          GEOIP_DB_PATH: /tmp/fake.mmdb
          COWRIE_LOG_PATH: /tmp/cowrie.json
          WEB_LOGIN_LOG_PATH: /tmp/web-login.json
        run: |
          # Create dummy log files for tests
          touch /tmp/cowrie.json /tmp/web-login.json
          # Run tests (creates test files if they exist)
          if [ -d "tests" ]; then
            pytest tests/ -v --tb=short
          else
            echo "No test directory found — skipping (add tests/test_api.py)"
          fi

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Trivy Security Scan
  # ──────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'     # Don't fail CI on first run; change to '1' for strict mode
          ignore-unfixed: true

  # ──────────────────────────────────────────────────────────────────────────
  # Job 4: Docker Build Test
  # ──────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create dummy .env for build
        run: |
          cat > .env << 'EOF'
          POSTGRES_USER=threatshield
          POSTGRES_PASSWORD=test123
          POSTGRES_DB=threatshield_db
          DATABASE_URL=postgresql+asyncpg://threatshield:test123@postgres:5432/threatshield_db
          SECRET_KEY=ci-test-secret
          BACKEND_CORS_ORIGINS=http://localhost:3000
          GEOIP_DB_PATH=/app/geoip/GeoLite2-City.mmdb
          COWRIE_LOG_PATH=/cowrie-logs/cowrie.json
          WEB_LOGIN_LOG_PATH=/cowrie-logs/web-login.json
          VITE_API_URL=http://localhost:8000
          VITE_WS_URL=ws://localhost:8000
          EOF

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: threatshield-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: threatshield-frontend:ci
          build-args: |
            VITE_API_URL=http://localhost:8000
            VITE_WS_URL=ws://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web-login honeypot image
        uses: docker/build-push-action@v5
        with:
          context: ./honeypot/web-login
          push: false
          tags: threatshield-web-login:ci

      # Optional: scan built images with Trivy
      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'threatshield-backend:ci'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '0'
        continue-on-error: true
